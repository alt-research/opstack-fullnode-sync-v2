version: '3.8'

services:
  geth:
    image: ${GETH_IMAGE}
    container_name: opstack-geth
    restart: unless-stopped
    ports:
      - "${GETH_HTTP_PORT:-8545}:${GETH_HTTP_PORT:-8545}"       # HTTP RPC
      - "${GETH_WS_PORT:-8546}:${GETH_WS_PORT:-8546}"           # WebSocket RPC
      - "${GETH_AUTHRPC_PORT:-8551}:${GETH_AUTHRPC_PORT:-8551}" # Engine API (AuthRPC)
      - "${GETH_METRICS_PORT:-6060}:${GETH_METRICS_PORT:-6060}" # Metrics
      - "${GETH_P2P_PORT:-30303}:${GETH_P2P_PORT:-30303}"       # P2P
    volumes:
      - geth-data:${GETH_DATADIR:-/data}
      - ./jwt.txt:${GETH_DATADIR:-/data}/jwt.txt:ro
      - ./scripts/geth-entrypoint.sh:/entrypoint.sh:ro
    env_file:
      - .env
    entrypoint: /bin/sh
    command: /entrypoint.sh
    networks:
      - opstack-network
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z localhost $${GETH_HTTP_PORT:-8545}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  node:
    image: ${NODE_IMAGE}
    container_name: opstack-node
    restart: unless-stopped
    ports:
      - "${OP_NODE_P2P_TCP_PORT:-9003}:${OP_NODE_P2P_TCP_PORT:-9003}"     # P2P TCP
      - "${OP_NODE_P2P_UDP_PORT:-9003}:${OP_NODE_P2P_UDP_PORT:-9003}/udp" # P2P UDP
      - "${OP_NODE_METRICS_PORT:-7300}:${OP_NODE_METRICS_PORT:-7300}"     # Metrics
      - "${OP_NODE_RPC_PORT:-9545}:${OP_NODE_RPC_PORT:-9545}"             # RPC
    volumes:
      - node-data:${OP_NODE_DATADIR:-/data}
      - ./jwt.txt:${OP_NODE_DATADIR:-/data}/jwt.txt:ro
      - ./scripts/node-entrypoint.sh:/entrypoint.sh:ro
    env_file:
      - .env
    entrypoint: /bin/sh
    command: /entrypoint.sh
    depends_on:
      geth:
        condition: service_healthy
    networks:
      - opstack-network
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z localhost $${OP_NODE_RPC_PORT:-9545}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  geth-data:
    driver: local
  node-data:
    driver: local

networks:
  opstack-network:
    driver: bridge
